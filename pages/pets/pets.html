<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Pets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div class="container">
        <div class="pets_header_wrapper header_wrapper">
            <div class="pets_header_logo header_logo">
                <a href="https://shelter.github.io" class="link">
                    <h1 class="pets_header_title header_title title">Cozy House</h1>
                    <div class="pets_header_subtitle header_subtitle subtitle">Shelter for pets in Boston</div>
                </a>
            </div>
            <nav class="pets_header_navigation header_navigation">
                <ul>
                    <li class="nav_item link_black">About the shelter</li>
                    <li class="nav_item link_black">Our pets</li>
                    <li class="nav_item link_black active">Help the shelter</li>
                    <li class="nav_item link_black">Contacts</li>
                </ul>
            </nav>
        </div>
    </div>
</header>
<main>
    <section class="pets">
        <div class="container">
            <h3 class="pets_header">Our friends who<br>
                are looking for a house
            </h3>
            <div class="pets_wrapper">
                <div class="pets_wrapper-item">
                    <img src="/assets/images/carousel/pets-katrine.png" alt="Keterine">
                    <h4>Katrine</h4>
                    <button class="border">Learn more</button>
                </div>
                <div class="pets_wrapper-item">
                    <img src="/assets/images/carousel/pets-jennifer.png" alt="Jennifer">
                    <h4>Jennifer</h4>
                    <button class="border">Learn more</button>
                </div>
                <div class="pets_wrapper-item">
                    <img src="/assets/images/carousel/pets-woody.png" alt="Woody">
                    <h4>Woody</h4>
                    <button class="border">Learn more</button>
                </div>
                <div class="pets_wrapper-item">
                    <img src="/assets/images/carousel/pets-sophia.png" alt="Sophia">
                    <h4>Sophia</h4>
                    <button class="border">Learn more</button>
                </div>
                <div class="pets_wrapper-item">
                    <img src="/assets/images/carousel/pets-timmy.png" alt="Timmy">
                    <h4>Timmy</h4>
                    <button class="border">Learn more</button>
                </div>
                <div class="pets_wrapper-item">
                    <img src="/assets/images/carousel/pets-charly.png" alt="Charly">
                    <h4>Charly</h4>
                    <button class="border">Learn more</button>
                </div>
                <div class="pets_wrapper-item">
                    <img src="/assets/images/carousel/pets-freddie.png" alt="Scarlett">
                    <h4>Scarlett</h4>
                    <button class="border">Learn more</button>
                </div>
                <div class="pets_wrapper-item">
                    <img src="/assets/images/carousel/pets-scarlett.png" alt="Freddie">
                    <h4>Freddie</h4>
                    <button class="border">Learn more</button>
                </div>
            </div>
            <div class="pets_carousel">
                <div class="pets_carousel-item start"><span><</span></div>
                <div class="pets_carousel-item prev"><span><<</span></div>
                <div class="pets_carousel-item number"><span>1</span></div>
                <div class="pets_carousel-item next"><span>></span></div>
                <div class="pets_carousel-item end"><span>>></span></div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
