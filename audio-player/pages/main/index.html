<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Audio Player</title>
    <!--add favicon here -->
    <link rel="apple-touch-icon" sizes="180x180" href="./../../assets/images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./../../assets/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./../../assets/images/favicon/favicon-16x16.png">
    <!--add styles here -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header_wrapper">
                <h1>Hi-Res Player</h1>
            </div>
        </div>
    </header>
    <section class="player">
        <div class="container">
            <div class="player_wrapper">
                <div class="player_item_wrapper">
                    <div class="player_item_wrapper_controls">
                        <div class="backward player_item_wrapper_controls-control" id="backward">
                            <img src="./../../assets/icons/backward.png" alt="Backward">
                        </div>
                        <div class="forward player_item_wrapper_controls-control" id="forward">
                            <img src="./../../assets/icons/forward.png" alt="Forward">
                        </div>
                    </div>
                    <div class="player_item_wrapper_image">
                        <img src="./../../assets/images/lemonade.png" alt="Beyonce Lemonade">
                    </div>
                    <div class="player_item_wrapper_main">
                        <div class="play player_item_wrapper_controls-control" id="play">
                            <img src="./../../assets/icons/play.png" alt="Play">
                        </div>
                        <div class="pause player_item_wrapper_controls-control player_item_none" id="pause">
                            <img src="./../../assets/icons/pause.png" alt="Pause">
                        </div>
                        <table>
                            <tbody>
                                <tr>
                                    <td>
                                        <p>Singer:</p>
                                    </td>
                                    <td>
                                        <h2>Beyonce</h2>
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <p>Song:</p>
                                    </td>
                                    <td>
                                        <h3>Lemonade</h3>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <audio src="./../../assets/audio/beyonce.mp3"></audio>
                </div>
            </div>
        </div>
    </section>
    <footer>
        <div class="container">
            <div class="footer_wrapper">
                <div class="footer_github">
                    <a href="https://github.com/montaana01">
                        <span>&nbsp;</span>
                        <svg height="40" aria-hidden="true" viewBox="0 0 24 24" version="1.1" width="40" data-view-component="true" class="octicon octicon-mark-github v-align-middle color-fg-default">
                            <path d="M12.5.75C6.146.75 1 5.896 1 12.25c0 5.089 3.292 9.387 7.863 10.91.575.101.79-.244.79-.546 0-.273-.014-1.178-.014-2.142-2.889.532-3.636-.704-3.866-1.35-.13-.331-.69-1.352-1.18-1.625-.402-.216-.977-.748-.014-.762.906-.014 1.553.834 1.769 1.179 1.035 1.74 2.688 1.25 3.349.948.1-.747.402-1.25.733-1.538-2.559-.287-5.232-1.279-5.232-5.678 0-1.25.445-2.285 1.178-3.09-.115-.288-.517-1.467.115-3.048 0 0 .963-.302 3.163 1.179.92-.259 1.897-.388 2.875-.388.977 0 1.955.13 2.875.388 2.2-1.495 3.162-1.179 3.162-1.179.633 1.581.23 2.76.115 3.048.733.805 1.179 1.825 1.179 3.09 0 4.413-2.688 5.39-5.247 5.678.417.36.776 1.05.776 2.128 0 1.538-.014 2.774-.014 3.162 0 .302.216.662.79.547C20.709 21.637 24 17.324 24 12.25 24 5.896 18.854.75 12.5.75Z"></path>
                        </svg>
                    </a>
                </div>
                <div class="footer_copyright">
                    <a href="https://github.com/rolling-scopes-school/montaana01-JSFEPRESCHOOL2024Q2">2024 ©</a>
                </div>
                <div class="footer_logo">
                    <a href="https://rs.school/courses/javascript-preschool-ru"><span>&nbsp;</span><img src="./../../assets/icons/rss-logo.svg" alt="The Rolling Scopes School"></a>
                </div>
            </div>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
